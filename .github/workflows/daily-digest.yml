name: Daily Digest

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Fetch papers
      run: |
        python scripts/fetch_papers.py --output /tmp/papers.json --max-results 10 --profile-path config/default_profile.yaml

    - name: Generate report
      run: |
        python scripts/generate_report.py /tmp/papers.json --profile config/default_profile.yaml
      continue-on-error: true

    - name: Upload report
      uses: actions/upload-artifact@v4
      with:
        name: daily-report
        path: |
          /tmp/papers.json
          ~/Desktop/*.pdf
      continue-on-error: true
