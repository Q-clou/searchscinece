name: Daily Digest

on:
  schedule:
    - cron: "0 8 * * *"  # Daily at 8:00 UTC
  workflow_dispatch:       # Manual trigger

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Fetch papers
      run: |
        python scripts/cli.py --profile profiles/default.yaml --step fetch

    - name: Generate report
      run: |
        python scripts/cli.py --profile profiles/default.yaml --step report

    - name: Upload report artifact
      uses: actions/upload-artifact@v4
      with:
        name: daily-report
        path: |
          ~/codex_outputs/*/papers.json
          ~/Desktop/*.pdf
      continue-on-error: true
